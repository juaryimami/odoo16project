[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

# Database connection - matching your .env variables
db_host = db16
db_port = 5432
db_user = odoo16user
db_password = Secure_Pwd_V16
db_name = odoo16db

# Security
admin_passwd = Admin_Pwd_V16

# Port mapping inside the container (Leave as 8069)
# Docker handles the mapping to 8060 externally
xmlrpc_port = 8069
longpolling_port = 8072

# Performance Tuning (Optional but recommended for VPS)
proxy_mode = True
workers = 2
max_cron_threads = 1
